<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esteban Martinez - ¿Quien es esteban martinez?</title>
    <!-- Fuente premium para un look artístico y limpio -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-premium: #070708;
            --gold-primary: #e6b960;
            --gold-light: #fff3d1;
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 100%);
            --glass-card: rgba(15, 15, 18, 0.65);
            --border-gold: rgba(230, 185, 96, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-premium);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- DETALLES DE ILUMINACIÓN DE FONDO --- */
        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .glow-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(230, 185, 96, 0.08) 0%, rgba(0,0,0,0) 70%);
            filter: blur(60px);
        }

        /* Fondo de partículas y destellos */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- TARJETA PRINCIPAL (ESTILO LUJO LUXURY) --- */
        .main-container {
            position: relative;
            z-index: 2;
            background: var(--glass-card);
            border: 1px solid var(--border-gold);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 4rem 3rem;
            border-radius: 30px;
            text-align: center;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Icono de Mezcladora / DJ en Dorado */
        .dj-brand-icon {
            width: 65px;
            height: 65px;
            margin: 0 auto 1.8rem auto;
            display: block;
            filter: drop-shadow(0 0 15px rgba(230, 185, 96, 0.4));
        }

        .dj-brand-icon svg {
            width: 100%;
            height: 100%;
            fill: url(#gold-metallic);
        }

        .dj-name {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #b1b1b8;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }

        .track-title {
            font-family: 'Cinzel', serif;
            font-size: 3.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
        }

        .release-tag {
            font-size: 0.85rem;
            color: var(--gold-primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
            margin-bottom: 3.5rem;
            opacity: 0.9;
        }

        /* --- RELOJ DE CUENTA REGRESIVA --- */
        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3.5rem;
        }

        .time-segment {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(230, 185, 96, 0.08);
            border-radius: 20px;
            padding: 1.5rem;
            min-width: 110px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Brillo sutil superior en cada caja */
        .time-segment::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,243,209,0.3), transparent);
        }

        .time-value {
            font-size: 3.2rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(180deg, #ffffff 60%, #b5b5b5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .time-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #71717a;
            font-weight: 600;
        }

        /* --- BOTÓN DE PRE-SAVE PREMIUM --- */
        .btn-gold {
            display: inline-flex;
            align-items: center;
            background: var(--gold-gradient);
            color: #000000;
            padding: 1.1rem 3rem;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(191, 149, 63, 0.25);
        }

        .btn-gold:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(191, 149, 63, 0.45);
            filter: brightness(1.1);
        }

        /* --- RESPONSIVO --- */
        @media (max-width: 600px) {
            .main-container { padding: 3rem 1.5rem; }
            .track-title { font-size: 2rem; }
            .countdown-wrapper { gap: 0.8rem; }
            .time-segment { min-width: 80px; padding: 1rem 0.5rem; border-radius: 14px; }
            .time-value { font-size: 2.2rem; }
            .time-title { font-size: 0.65rem; letter-spacing: 1px; }
            .btn-gold { padding: 1rem 2.2rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- Luces de ambiente traseras -->
    <div class="ambient-glow">
        <div class="glow-center"></div>
    </div>

    <!-- Lienzo interactivo de destellos dorados -->
    <canvas id="particle-canvas"></canvas>

    <div class="main-container">
        
        <!-- Icono Vectorial de Tornamesa/DJ en oro metálico -->
        <div class="dj-brand-icon">
            <svg viewBox="0 0 24 24">
                <defs>
                    <linearGradient id="gold-metallic" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#bf953f" />
                        <stop offset="25%" stop-color="#fcf6ba" />
                        <stop offset="50%" stop-color="#b38728" />
                        <stop offset="100%" stop-color="#fbf5b7" />
                    </linearGradient>
                </defs>
                <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,10A2,2 0 0,0 10,12A2,2 0 0,0 12,14A2,2 0 0,0 14,12A2,2 0 0,0 12,10M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6Z"/>
            </svg>
        </div>

        <p class="dj-name">Esteban Martinez</p>
        <h1 class="track-title">¿Quien es esteban martinez?</h1>
        <p class="release-tag">Estreno Exclusivo</p>

        <!-- Cronómetro -->
        <div class="countdown-wrapper">
            <div class="time-segment">
                <span class="time-value" id="hours">00</span>
                <span class="time-title">Horas</span>
            </div>
            <div class="time-segment">
                <span class="time-value" id="minutes">00</span>
                <span class="time-title">Minutos</span>
            </div>
            <div class="time-segment">
                <span class="time-value" id="seconds">00</span>
                <span class="time-title">Segundos</span>
            </div>
        </div>

        <!-- Call To Action -->
        <a href="#" class="btn-gold" id="presave-link">Pre-Salvar Sonido</a>

    </div>

    <script>
        /* ===================================================
           LÓGICA DE LA CUENTA REGRESIVA (AUTOMÁTICA)
           =================================================== */
        function getTargetDate() {
            const now = new Date();
            // Mañana es la fecha actual + 1 día
            const target = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            // Configurar a las 17:00:00 (5:00 PM) hora local
            target.setHours(17, 0, 0, 0);
            return target.getTime();
        }

        const countdownTarget = getTargetDate();

        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const difference = countdownTarget - now;

            if (difference <= 0) {
                clearInterval(timerInterval);
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
                document.querySelector(".release-tag").innerHTML = "¡YA DISPONIBLE!";
                return;
            }

            // Cálculo matemático del tiempo restante (Horas totales, minutos y segundos)
            const hours = Math.floor(difference / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Se añade un cero a la izquierda si el valor es menor a 10
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
        }, 1000);


        /* ===================================================
           SISTEMA DE DESTELLOS DORADOS (CANVAS)
           =================================================== */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        const particleCount = 45; // Cantidad equilibrada para que se vea elegante y no saturado

        class GoldParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height; // Distribución inicial vertical
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 20;
                this.size = Math.random() * 2.5 + 0.5; // Tamaños finos
                this.speedY = Math.random() * 0.6 + 0.2; // Movimiento lento hacia arriba
                this.speedX = (Math.random() - 0.5) * 0.3; 
                this.opacity = Math.random() * 0.5 + 0.2;
                this.fadeSpeed = Math.random() * 0.005 + 0.002;
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                
                // Efecto centelleo (flicker)
                this.opacity += (Math.random() - 0.5) * 0.04;
                if(this.opacity < 0.1) this.opacity = 0.1;
                if(this.opacity > 0.7) this.opacity = 0.7;

                if (this.y < -10) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                // Color dorado premium translúcido
                ctx.fillStyle = `rgba(230, 185, 96, ${this.opacity})`;
                ctx.shadowBlur = this.size * 3;
                ctx.shadowColor = '#bf953f';
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new GoldParticle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Resetear shadowBlur para que no afecte a todo
            ctx.shadowBlur = 0; 
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
